spec:
  inputs:
    component:
      description: Component name
    deploy_rules:
      default: []
      description: GitLab CI rules for the deploy job.
      type: array
    deployment:
      description: Deployment name
    plan_needs:
      default: []
      description: Jobs that must complete before plan runs (cross-stack dependencies).
      type: array
    rules:
      default: []
      description: GitLab CI rules for the plan job.
      type: array
    stack:
      description: Stack name
---
$[[ inputs.stack ]]_$[[ inputs.component ]]_$[[ inputs.deployment ]]_deploy:
  before_script:
    - nix print-dev-env .#profile-tofu > profile-tofu.sh
    - . ./profile-tofu.sh
  image: nixos/nix
  needs:
    - artifacts: true
      job: $[[ inputs.stack ]]_$[[ inputs.component ]]_$[[ inputs.deployment ]]_plan
      optional: false
  script:
    - tofu -chdir=terraform/$STACK/$COMPONENT init -backend-config=deployments/$DEPLOYMENT/backend.tfbackend
    - tofu -chdir=terraform/$STACK/$COMPONENT apply -auto-approve tfplan
  stage: main
  variables:
    COMPONENT: $[[ inputs.component ]]
    DEPLOYMENT: $[[ inputs.deployment ]]
    NIX_CONFIG: experimental-features = nix-command flakes
    STACK: $[[ inputs.stack ]]
    TF_IN_AUTOMATION: "1"
$[[ inputs.stack ]]_$[[ inputs.component ]]_$[[ inputs.deployment ]]_plan:
  artifacts:
    expire_in: 7 days
    paths:
      - terraform/$STACK/$COMPONENT/tfplan
    public: false
  before_script:
    - nix print-dev-env .#profile-tofu > profile-tofu.sh
    - . ./profile-tofu.sh
  image: nixos/nix
  needs: $[[ inputs.plan_needs ]]
  script:
    - tofu -chdir=terraform/$STACK/$COMPONENT init -backend-config=deployments/$DEPLOYMENT/backend.tfbackend
    - tofu -chdir=terraform/$STACK/$COMPONENT validate
    - tofu -chdir=terraform/$STACK/$COMPONENT plan -var-file=deployments/$DEPLOYMENT/terraform.tfvars -out=tfplan
  stage: main
  variables:
    COMPONENT: $[[ inputs.component ]]
    DEPLOYMENT: $[[ inputs.deployment ]]
    NIX_CONFIG: experimental-features = nix-command flakes
    STACK: $[[ inputs.stack ]]
    TF_IN_AUTOMATION: "1"
