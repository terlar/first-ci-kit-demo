jobs:
  changes:
    outputs:
      changes: ${{ steps.diff.outputs.changes }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - env:
          DIFF_PATHS: |-
            cluster_control-plane_dev:terraform/cluster/control-plane/**|terraform/modules/component/**
            cluster_control-plane_stg:terraform/cluster/control-plane/**|terraform/modules/component/**
            cluster_node-pools_dev:terraform/cluster/node-pools/**|terraform/modules/component/**
            cluster_node-pools_stg:terraform/cluster/node-pools/**|terraform/modules/component/**
            database_postgres_dev:terraform/database/postgres/**|terraform/modules/component/**
            database_postgres_stg:terraform/database/postgres/**|terraform/modules/component/**
            database_redis_dev:terraform/database/redis/**|terraform/modules/component/**
            database_redis_stg:terraform/database/redis/**|terraform/modules/component/**
            networking_dns_dev:terraform/networking/dns/**|terraform/modules/component/**
            networking_dns_stg:terraform/networking/dns/**|terraform/modules/component/**
            networking_vpc_dev:terraform/networking/vpc/**|terraform/modules/component/**
            networking_vpc_stg:terraform/networking/vpc/**|terraform/modules/component/**
            observability_alerting_dev:terraform/observability/alerting/**|terraform/modules/component/**
            observability_alerting_stg:terraform/observability/alerting/**|terraform/modules/component/**
            observability_logging_dev:terraform/observability/logging/**|terraform/modules/component/**
            observability_logging_stg:terraform/observability/logging/**|terraform/modules/component/**
            observability_metrics_dev:terraform/observability/metrics/**|terraform/modules/component/**
            observability_metrics_stg:terraform/observability/metrics/**|terraform/modules/component/**
            platform-services_cert-manager_dev:terraform/platform-services/cert-manager/**|terraform/modules/component/**
            platform-services_cert-manager_stg:terraform/platform-services/cert-manager/**|terraform/modules/component/**
            platform-services_ingress_dev:terraform/platform-services/ingress/**|terraform/modules/component/**
            platform-services_ingress_stg:terraform/platform-services/ingress/**|terraform/modules/component/**
            security_certs_dev:terraform/security/certs/**|terraform/modules/component/**
            security_certs_stg:terraform/security/certs/**|terraform/modules/component/**
            security_iam_dev:terraform/security/iam/**|terraform/modules/component/**
            security_iam_stg:terraform/security/iam/**|terraform/modules/component/**
          FORCE_RUN_ALL: ${{ inputs.force_run_all }}
          GITHUB_EVENT_AFTER: ${{ github.event.after }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        id: diff
        run: |
          case "$GITHUB_EVENT_NAME" in
          push)
          	first_commit="$GITHUB_EVENT_BEFORE"
          	last_commit="$GITHUB_EVENT_AFTER"
          	git fetch origin "$first_commit"
          	;;
          pull_request)
          	first_commit="origin/$GITHUB_BASE_REF"
          	last_commit="origin/$GITHUB_HEAD_REF"
          	git fetch origin "$GITHUB_BASE_REF" "$GITHUB_HEAD_REF"
          	;;
          workflow_dispatch)
          	change_lines=()
          	for p in $DIFF_PATHS; do
          		group="${p%:*}"
          		if [[ "${FORCE_RUN_ALL:-}" == "true" ]]; then
          			change_lines+=("\"$group\":true")
          		else
          			change_lines+=("\"$group\":false")
          		fi
          	done
          	change_object_body="$(printf '%s\n' "${change_lines[@]}" | paste -sd,)"
          	echo "changes={$change_object_body}" >>"$GITHUB_OUTPUT"
          	if [[ "${FORCE_RUN_ALL:-}" == "true" ]]; then
          		echo "## All jobs affected (change detection skipped)" >>"$GITHUB_STEP_SUMMARY"
          	else
          		echo "## No jobs affected (set force_run_all to run all jobs)" >>"$GITHUB_STEP_SUMMARY"
          	fi
          	exit 0
          	;;
          esac

          files=$(git diff --name-only --diff-filter=d "${first_commit}" "${last_commit}")
          change_lines=()
          for p in $DIFF_PATHS; do
          	group="${p%:*}"
          	pattern="${p##*:}"
          	# Convert glob pattern to ERE for grep.
          	# Use placeholders for ** patterns first, then convert *, then restore
          	# placeholders — this prevents the * in ERE replacements (e.g. .*)
          	# from being incorrectly re-converted by the s|\*|[^/]*| step.
          	#   /**/   →  /(.*/)?   (zero or more intermediate directories)
          	#   /**    →  (/.*)?    (optional slash + anything, at end)
          	#   **/    →  (.*/)?    (zero or more leading directories)
          	#   **     →  .*        (any characters including slashes)
          	#   *      →  [^/]*     (any characters within a single path component)
          	#   .      →  \.        (literal dot)
          	regex=$(printf '%s' "$pattern" |
          		sed \
          			-e 's/\./\\./g' \
          			-e 's|/\*\*/|__DIRANY__|g' \
          			-e 's|/\*\*|__SLASHANY__|g' \
          			-e 's|\*\*/|__ANYSLASH__|g' \
          			-e 's|\*\*|__ANYANY__|g' \
          			-e 's|\*|[^/]*|g' \
          			-e 's|__DIRANY__|/(.*/)?|g' \
          			-e 's|__SLASHANY__|(/.*)?|g' \
          			-e 's|__ANYSLASH__|(.*/)?|g' \
          			-e 's|__ANYANY__|.*|g')
          	if echo "$files" | grep -qE "^(${regex})$"; then
          		change_lines+=("\"$group\":true")
          	else
          		change_lines+=("\"$group\":false")
          	fi
          done

          change_object_body="$(printf '%s\n' "${change_lines[@]}" | paste -sd,)"
          echo "changes={$change_object_body}" >>"$GITHUB_OUTPUT"

          affected_jobs=()
          for line in "${change_lines[@]}"; do
          	if [[ "$line" == *":true"* ]]; then
          		affected_jobs+=("${line//\"/}")
          		affected_jobs[-1]="${affected_jobs[-1]%:*}"
          	fi
          done

          if [[ ${#affected_jobs[@]} -gt 0 ]]; then
          	echo "Affected jobs (${#affected_jobs[@]}):"
          	printf '  %s\n' "${affected_jobs[@]}"
          	{
          		echo "## Affected jobs (${#affected_jobs[@]})"
          		printf -- '- %s\n' "${affected_jobs[@]}"
          	} >>"$GITHUB_STEP_SUMMARY"
          else
          	echo "No affected jobs."
          	echo "## No affected jobs" >>"$GITHUB_STEP_SUMMARY"
          fi
        shell: bash
  cluster_control-plane_dev:
    if: ${{ fromJSON(needs.changes.outputs.changes)['cluster_control-plane_dev'] == true }}
    needs:
      - changes
    secrets: inherit
    uses: ./.github/workflows/profile-tofu.yml
